<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="home-body">

    <div class="container-fluid">

        <!-- Header -->
        <div class="home-header">

            <div>
                <h2 class="system-title">
                    Wrong Stud Prevention System
                </h2>

                <p class="operator-info">
                    Operator: <span id="operatorName"></span>
                </p>
            </div>

            <button class="logout-button" onclick="logoutOperator()">
                Logout
            </button>

        </div>

        <!-- Main Buttons -->
        <div class="home-buttons-container">

            <button class="main-action-button"
                onclick="openStudFeeding()">
                STUD FEEDING
            </button>

            <button class="disabled-button" disabled>
                SEALER DRUM CHANGE
            </button>

            <button class="disabled-button" disabled>
                PART VERIFICATION
            </button>

        </div>

    </div>

    <script>

        // Display operator ID
        const employeeId = localStorage.getItem("employeeId");

        if (!employeeId) {
            window.location.href = "login.html";
        }

        document.getElementById("operatorName").innerText = employeeId;

        // Logout
        function logoutOperator() {
            localStorage.removeItem("employeeId");
            window.location.href = "login.html";
        }

        // Open Stud Feeding
        function openStudFeeding() {
            window.location.href = "machine-scan.html";
        }

    </script>

</body>
</html>
